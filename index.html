<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <title>Login UI</title>
</head>

<body>

    <div class="container" id="container">

        <!-- SIGN IN -->
        <div class="form-container sign-in">
            <form>
                <h2>Sign In</h2>

                <input type="email" placeholder="Email">

                <div class="password-box">
                    <input type="password" id="loginPassword" placeholder="Password">
                    <span class="eye" onclick="togglePassword('loginPassword', this)">
                        <i class="fa-solid fa-eye"></i>
                    </span>
                </div>

                <button type="button" onclick="login()">Sign In</button>

                <p class="switch-text">
                    Don't have an account? 
                    <span onclick="toggle()">Sign up here</span>
                </p>

            </form>
        </div>

        <!-- SIGN UP -->
        <div class="form-container sign-up">
            <form>
                <h2>Sign Up</h2>

                <input type="text" placeholder="Name">
                <input type="email" placeholder="Email">

                <div class="password-box">
                    <input type="password" id="signupPassword" placeholder="Password">
                    <span class="eye" onclick="togglePassword('signupPassword', this)">
                        <i class="fa-solid fa-eye"></i>
                    </span>
                </div>

                <button type="button" onclick="register()">Sign Up</button>

                <p class="switch-text">
                    Already have an account? 
                    <span onclick="toggle()">Sign in here</span>
                </p>
            </form>
        </div>

        <!-- WELCOME / SIDE PANEL -->
        <div class="welcome">
            <div>
                <h2>Welcome</h2>
                <p>Click below to switch</p>

                <button type="button" onclick="toggle()">Switch</button>
            </div>
        </div>

    </div>

        <script src="script.js"></script>

    </body>
    </html>
